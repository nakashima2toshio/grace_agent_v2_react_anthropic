# ============================================================================
# CI + 自動マージ ワークフロー（React マイグレーション版）
# ----------------------------------------------------------------------------
# 方針:
#  - 必須ゲート（blocking）:
#      build         = `python -m compileall`（全 .py の構文チェック）
#      lint          = `ruff check .`（本リポジトリは lint 負債ゼロで開始）
#      backend-tests = `pytest backend/tests`（イベント駆動コア・HITL・API。
#                       スタブベースで API キー・Qdrant 不要）
#      frontend      = `tsc --noEmit` + `vitest run` + `vite build`
#  - unit-tests（レガシー全体スイート）: advisory（continue-on-error）。
#    実 Anthropic/Qdrant 依存の統合テストは skipif で自動 skip。
#  - 自動マージ: 必須ゲートが緑になった `claude/*` ブランチの PR を master へ
#    自動マージ。ドラフトでも Ready 化して merge する（claude/* 限定）。
#    `hold` ラベルが付いた PR は自動マージしない（保留用エスケープ）。
#  - master への直接 push は許可（ブランチ保護は掛けない）。
# ============================================================================
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [master]
  push:
    branches: [master]

# 自動マージ（gh pr merge / gh pr ready）に必要な書き込み権限
permissions:
  contents: write
  pull-requests: write

# 同一参照に対する多重実行を抑制
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # 必須チェック: compileall（構文ゲート / blocking）
  # --------------------------------------------------------------------------
  build:
    name: compile (syntax gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ハードゲート: 全 .py の構文/バイトコンパイル（外部サービス・APIキー不要）
      - name: Compile all (syntax gate)
        run: python -m compileall -q -x '\.venv|/old_code/|/\.git/|/chunking/check_code/' .

  # --------------------------------------------------------------------------
  # lint（ruff / blocking）: pyproject.toml の [tool.ruff] 設定に従う
  # --------------------------------------------------------------------------
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.12.11

      - name: Ruff lint (whole repo)
        run: ruff check .

  # --------------------------------------------------------------------------
  # backend テスト（blocking）: イベント駆動コア・HITLブリッジ・FastAPI。
  # スタブベース（conftest.install_pipeline_stub）で API キー・Qdrant 不要。
  # --------------------------------------------------------------------------
  backend-tests:
    name: pytest (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: pytest backend/tests -q -rs

  # --------------------------------------------------------------------------
  # frontend（blocking）: 型チェック（tsc）＋ vitest ＋ プロダクションビルド
  # --------------------------------------------------------------------------
  frontend:
    name: frontend (tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

  # --------------------------------------------------------------------------
  # ユニットテスト（レガシー全体スイート / advisory）:
  #   実 Anthropic/Qdrant 依存の統合テストは APIキー未設定時に skipif で自動 skip。
  #   安定を確認したら blocking 化して auto-merge の needs に追加する。
  # --------------------------------------------------------------------------
  unit-tests:
    name: pytest (full suite, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true  # 安定するまでは advisory（マージをブロックしない）
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run unit tests (integration auto-skipped)
        env:
          PYTHONPATH: .
        run: pytest tests/ backend/tests -q -rs

  # --------------------------------------------------------------------------
  # 自動マージ: claude/* ブランチの PR を必須ゲート成功後に master へマージ
  # --------------------------------------------------------------------------
  auto-merge:
    name: auto-merge (claude/*)
    needs: [build, lint, backend-tests, frontend]
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'claude/') &&
      !contains(github.event.pull_request.labels.*.name, 'hold')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mark ready & merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # ドラフトなら Ready 化（既に Ready ならエラーになるので無視）
          gh pr ready "$PR" --repo "$REPO" || true
          # 必須ゲート成功後にマージ。マージコミット方式。
          gh pr merge "$PR" --repo "$REPO" --merge
